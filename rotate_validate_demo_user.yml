---
- name: Trigger demo-user IAM key rotation Lambda
  hosts: localhost
  gather_facts: false

  vars:
    aws_region: us-east-1
    lambda_function_name: key-rotation-for-demo-user

  tasks:
    - name: Trigger Lambda rotation
      amazon.aws.lambda_execute:
        name: "{{ lambda_function_name }}"
        region: "{{ aws_region }}"
        payload: {}
      register: lambda_result

    - name: Show Lambda result
      debug:
        var: lambda_result

    - name: Confirm Lambda was invoked
      debug:
        msg:
          - "Lambda function invoked: {{ lambda_function_name }}"
          - "Region: {{ aws_region }}"
          - "Check AWS Secrets Manager and ESO sync from your Mac/OCP bastion."
