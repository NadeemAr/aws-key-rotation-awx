---
- name: Rotate and validate demo-user IAM key sync
  hosts: localhost
  gather_facts: false

  vars:
    iam_user: demo-user
    aws_region: us-east-1
    aws_secret_name: /iam/rotated-keys/demo-user
    ocp_namespace: demo-user-test
    ocp_secret: demo-user-aws-creds
    externalsecret_name: demo-user-aws-creds-sync
    lambda_function_name: key-rotation-for-demo-user

  tasks:
    - name: Trigger Lambda rotation
      amazon.aws.lambda_execute:
        name: "{{ lambda_function_name }}"
        region: "{{ aws_region }}"
        payload: {}
      register: lambda_result

    - name: Show Lambda result
      debug:
        var: lambda_result

    - name: Wait for ExternalSecret to exist
      kubernetes.core.k8s_info:
        api_version: external-secrets.io/v1
        kind: ExternalSecret
        name: "{{ externalsecret_name }}"
        namespace: "{{ ocp_namespace }}"
      register: eso_info
      retries: 10
      delay: 30
      until: eso_info.resources | length > 0

    - name: Wait for OpenShift secret to be synced
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Secret
        name: "{{ ocp_secret }}"
        namespace: "{{ ocp_namespace }}"
      register: ocp_secret_info
      retries: 10
      delay: 30
      until:
        - ocp_secret_info.resources | length > 0
        - ocp_secret_info.resources[0].data.aws_access_key_id is defined

    - name: Show synced OCP access key
      debug:
        msg: "OCP secret has synced access key: {{ ocp_secret_info.resources[0].data.aws_access_key_id | b64decode }}"
