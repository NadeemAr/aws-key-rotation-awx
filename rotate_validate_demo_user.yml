---
- name: Rotate and validate demo-user IAM key sync
  hosts: localhost
  gather_facts: false

  vars:
    iam_user: demo-user
    aws_secret_name: /iam/rotated-keys/demo-user
    ocp_namespace: demo-user-test
    ocp_secret: demo-user-aws-creds
    pod_name: demo-user-test-pod
    lambda_function_name: key-rotation-for-demo-user

  tasks:
    - name: Trigger Lambda rotation
      amazon.aws.lambda_execute:
        name: "{{ lambda_function_name }}"
        payload: {}
      register: lambda_result

    - name: Show Lambda result
      debug:
        var: lambda_result

    - name: Wait for ESO sync
      command: >
        oc get externalsecret demo-user-aws-creds-sync
        -n {{ ocp_namespace }}
      register: eso_status
      retries: 10
      delay: 30
      until: eso_status.rc == 0

    - name: Get OpenShift synced access key
      shell: >
        oc get secret {{ ocp_secret }} -n {{ ocp_namespace }}
        -o jsonpath='{.data.aws_access_key_id}' | base64 -d
      register: ocp_access_key

    - name: Show synced OCP access key
      debug:
        msg: "OCP secret has synced access key: {{ ocp_access_key.stdout }}"

    - name: Restart test pod
      command: oc delete pod {{ pod_name }} -n {{ ocp_namespace }}
      ignore_errors: true

    - name: Recreate test pod
      command: oc apply -f demo-user-test-pod.yaml

    - name: Wait for pod to be Running
      command: >
        oc get pod {{ pod_name }} -n {{ ocp_namespace }}
        -o jsonpath='{.status.phase}'
      register: pod_phase
      retries: 20
      delay: 10
      until: pod_phase.stdout == "Running"

    - name: Validate pod sees synced AWS key
      shell: >
        oc exec -n {{ ocp_namespace }} {{ pod_name }} --
        printenv AWS_ACCESS_KEY_ID
      register: pod_access_key

    - name: Show pod access key
      debug:
        msg: "Pod is using AWS access key: {{ pod_access_key.stdout }}"
